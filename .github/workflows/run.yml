name: Blogger RSS Invisible Automator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: 🔐 Şifreli Haber Hafızasını Yükle (Restore Cache)
      uses: actions/cache/restore@v4
      with:
        path: .posted_cache.json
        key: blogger-news-permanent-cache
        restore-keys: |
          blogger-news-permanent-cache

    - name: ⚙️ Otomasyonu Görünmez Modda Çalıştır
      env:
        BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        GIZLI_API_HAVUZU: ${{ secrets.GIZLI_API_HAVUZU }}
        GIZLI_RSS_AYARLARI: ${{ vars.GIZLI_RSS_AYARLARI }}
      run: python main.py

    - name: 🔐 Güncel Haber Hafızasını Kilitle (Save Cache)
      if: always()
      uses: actions/cache/save@v4
      with:
        path: .posted_cache.json
        key: blogger-news-permanent-cache
