name: Blogger RSS Invisible Automator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: 🔐 Şifreli Haber Hafızasını Yükle
      uses: actions/cache/restore@v4
      with:
        path: .posted_cache.json
        key: blogger-news-permanent-cache
        restore-keys: |
          blogger-news-permanent-cache

    - name: ⚙️ Otomasyonu Çalıştır
      env:
        BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      run: python main.py

    - name: 📝 Değişiklikleri Depoya İşle (Auto-Commit)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Otomasyon: Zaman ayarları senkronize edildi" && git push)

    - name: 🔐 Güncel Haber Hafızasını Kilitle
      if: always()
      uses: actions/cache/save@v4
      with:
        path: .posted_cache.json
        key: blogger-news-permanent-cache
