<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogger RSS Otomasyon & Yönetim Paneli</title>
    <!-- Google Fonts & Bootstrap 5 & Font Awesome İkon Kütüphanesi -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href="https://cloudflare.com" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { 
            --bg-dark-900: #0f172a; 
            --bg-dark-800: #1e293b; 
            --border-dark: #334155; 
            --text-muted: #94a3b8; 
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0; 
            padding: 0; 
        }
        /* MOBİL UYUMLU GİRİŞ EKRANI */
        .login-wrapper { 
            background-color: var(--bg-dark-900); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 1rem;
        }
        .login-card { 
            background-color: var(--bg-dark-800); 
            border: 1px solid var(--border-dark); 
            border-radius: 16px; 
            width: 100%; 
            max-width: 410px; 
            padding: 2rem; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); 
        }
        .login-card .form-control { 
            background-color: var(--bg-dark-900); 
            border: 1px solid var(--border-dark); 
            color: #ffffff; 
        }
        .login-card .form-control:focus {
            background-color: var(--bg-dark-900);
            color: #ffffff;
            border-color: #3b82f6;
            box-shadow: none;
        }
        /* MOBİL UYUMLU DUYARLI PANEL (DASHBOARD) MİMARİSİ */
        .dashboard-wrapper { 
            display: none; 
            min-height: 100vh; 
            flex-direction: column;
        }
        .sidebar { 
            width: 260px; 
            background-color: var(--bg-dark-900); 
            color: #ffffff; 
            min-height: 100vh; 
            position: fixed; 
            padding: 2rem 1.5rem; 
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .main-content { 
            margin-left: 260px; 
            width: calc(100% - 260px); 
            padding: 2rem; 
            transition: margin 0.3s ease, width 0.3s ease;
        }
        .mobile-header {
            display: none;
            background-color: var(--bg-dark-900);
            color: #ffffff;
            padding: 1rem;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 101;
        }
        .card-custom { 
            background: #ffffff; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            margin-bottom: 2rem; 
            overflow: hidden; 
        }
        .card-custom-header { 
            padding: 1rem 1.5rem; 
            font-weight: 600; 
            color: #ffffff; 
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        /* RESPONSIVE BREAKPOINTS (MOBİL AYARLARI) */
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
                height: 100vh;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 1.25rem;
            }
            .mobile-header {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- ====================================================================
         GİRİŞ EKRANI
         ==================================================================== -->
    <div id="loginSection" class="login-wrapper">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="d-inline-block p-3 mb-2 rounded-circle" style="background: rgba(37,99,235,0.15)">
                    <i class="fa-solid fa-shield-halved fa-2x text-primary"></i>
                </div>
                <h4 class="text-white fw-bold mb-1">Sistem Girişi</h4>
                <p style="color: var(--text-muted); font-size: 13px;">Blogger RSS Otomasyon Paneli</p>
            </div>
            <div class="mb-3">
                <label class="form-label text-white-50 small fw-medium">
                    <i class="fa-solid fa-user me-1"></i> Kullanıcı Adı
                </label>
                <input type="text" id="usernameInput" class="form-control form-control-lg" autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label text-white-50 small fw-medium">
                    <i class="fa-solid fa-lock me-1"></i> Şifre
                </label>
                <input type="password" id="passwordInput" class="form-control form-control-lg">
            </div>
            <button onclick="handleLogin()" class="btn btn-primary btn-lg w-100 fw-bold">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Giriş Yap
            </button>
            <div id="loginError" class="text-danger mt-3 text-center small fw-medium" style="display:none;">
                <i class="fa-solid fa-triangle-exclamation me-1"></i> Hatalı Kullanıcı Adı veya Şifre!
            </div>
        </div>
    </div>

    <!-- ====================================================================
         PANEL EKRANI (DASHBOARD)
         ==================================================================== -->
    <div id="adminSection" class="dashboard-wrapper">
        
        <!-- Mobil Cihazlar İçin Üst Bar -->
        <div class="mobile-header">
            <h5 class="fw-bold m-0"><i class="fa-solid fa-square-rss me-2 text-primary"></i>Blogger RSS</h5>
            <button class="btn btn-dark btn-sm" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars fa-lg"></i>
            </button>
        </div>

        <!-- Sol Menü (Sidebar) -->
        <div class="sidebar d-flex flex-column justify-content-between" id="sidebarMenu">
            <div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold m-0"><i class="fa-solid fa-square-rss me-2 text-primary"></i>Blogger RSS</h4>
                    <button class="btn btn-link text-white p-0 d-lg-none" onclick="toggleSidebar()">
                        <i class="fa-solid fa-xmark fa-xl"></i>
                    </button>
                </div>
                <hr style="border-color: var(--border-dark)">
                <div class="nav flex-column nav-pills mt-4">
                    <a class="nav-link active py-2.5 px-3 rounded-3 small fw-semibold mb-2" href="#">
                        <i class="fa-solid fa-arrows-spin me-2"></i> Otomasyon Havuzu
                    </a>
                </div>
            </div>
            <div class="d-flex align-items-center p-2 rounded-3" style="background-color: var(--bg-dark-800)">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold" style="width: 36px; height: 36px;">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <div class="ms-2">
                    <div class="text-white small fw-bold">Hamdi</div>
                    <div style="color: var(--text-muted); font-size: 10px;"><i class="fa-solid fa-circle text-success me-1" style="font-size: 8px;"></i>Yönetici</div>
                </div>
            </div>
        </div>

        <!-- Sağ Ana İçerik Alanı -->
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom flex-wrap gap-2">
                <h2 class="fw-bold text-dark mb-0"><i class="fa-solid fa-sliders me-2"></i>RSS Kaynak Yönetimi</h2>
                <div class="d-flex align-items-center gap-2">
                    <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm px-3 fw-medium">
                        <i class="fa-solid fa-power-off me-1"></i> Güvenli Çıkış
                    </button>
                </div>
            </div>

            <!-- Kayıt Formu -->
            <div class="card-custom">
                <div class="card-custom-header bg-success">
                    <i class="fa-solid fa-circle-plus"></i> Yeni Otomatik RSS Kaynağı Ekle
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-lg-6 col-md-10">
                            <label class="form-label small fw-bold text-secondary">
                                <i class="fa-solid fa-link me-1"></i> RSS URL Adresi
                            </label>
                            <input type="url" id="rssUrl" class="form-control" placeholder="https://site.com" required>
                        </div>
                        <div class="col-lg-3 col-md-6">
                            <label class="form-label small fw-bold text-secondary">
                                <i class="fa-solid fa-stopwatch me-1"></i> Zamanlama
                            </label>
                            <select id="intervalMinutes" class="form-select">
                                <option value="5">5 Dakika</option>
                                <option value="10">10 Dakika</option>
