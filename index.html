<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07150d">
<meta name="robots" content="noindex,nofollow">
<title>MiFRM RSS Publisher</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

<section id="loginView" class="card auth-card">
<h1>MiFRM RSS Publisher</h1>
<p class="muted">Yönetici Paneli</p>

<form id="loginForm">
<label>
E-posta
<input id="email" type="email" readonly>
</label>

<label>
Şifre
<input id="password" type="password" autocomplete="current-password" required>
</label>

<button type="submit">Giriş Yap</button>
</form>

<p id="loginMessage" class="message"></p>
</section>


<section id="panelView" hidden>

<header class="topbar">
<div>
<h1>RSS → Blogger</h1>
<small id="userEmail" class="muted"></small>
</div>

<button id="logoutBtn" class="secondary">Çıkış</button>
</header>


<section class="stats">
<article>
<span>Kaynak</span>
<strong id="statFeeds">0</strong>
</article>

<article>
<span>Aktif</span>
<strong id="statActive">0</strong>
</article>

<article>
<span>Toplam Yayın</span>
<strong id="statPublished">0</strong>
</article>
</section>


<section class="card">
<h2>Yeni Kaynak Ekle</h2>

<form id="feedForm">

<label>
Kaynak Adı
<input id="feedName" maxlength="150" placeholder="Ömür Dediğin" required>
</label>

<label>
Kaynak Türü
<select id="sourceType">
<option value="auto">Otomatik Algıla</option>
<option value="rss">RSS</option>
<option value="atom">Atom</option>
<option value="youtube">YouTube</option>
</select>
</label>

<label>
RSS / Atom URL
<input id="sourceUrl" type="url" placeholder="https://..." required>
</label>

<label>
Blogger Etiketi / Kategorisi
<input id="bloggerLabel" maxlength="100" placeholder="Ömür Dediğin" required>
</label>

<div class="grid">

<label>
Bir Çalışmada Kaç İçerik?
<input id="maxItems" type="number" min="1" max="50" value="5" required>
</label>

<label>
Kontrol Aralığı
<select id="intervalHours">
<option value="1">1 saat</option>
<option value="3">3 saat</option>
<option value="6" selected>6 saat</option>
<option value="12">12 saat</option>
<option value="24">24 saat</option>
</select>
</label>

</div>

<button type="submit">Kaynağı Kaydet</button>
<p id="formMessage" class="message"></p>

</form>
</section>


<section class="card">
<div class="head">
<h2>Kaynaklar</h2>
<button id="refreshBtn" class="secondary small">Yenile</button>
</div>
<div id="feeds">Yükleniyor...</div>
</section>


<section class="card">
<h2>Son Yayınlar</h2>
<div id="history">Yükleniyor...</div>
</section>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
