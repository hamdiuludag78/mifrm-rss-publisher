<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogger RSS Otomasyon &amp; Yönetim Paneli</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href="https://cloudflare.com" rel="stylesheet">
    <script src="https://google.com" async defer></script>
    <style>
        :root { --dmoz-green: #228b22; --dmoz-bar-green: #ccffcc; --dmoz-bg: #ffffff; --dmoz-gray-bar: #eeeeee; --dmoz-text: #000000; }
        body { font-family: 'Arial', sans-serif; background-color: var(--dmoz-bg); color: var(--dmoz-text); margin: 0; padding: 0; }
        .login-wrapper { background-color: #f6f6f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.25rem; }
        .login-card { background-color: var(--dmoz-bg); border: 2px solid var(--dmoz-green); border-radius: 4px; width: 100%; max-width: 420px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .login-card .form-control { background-color: #ffffff; border: 1px solid #7f9db9; color: #000000; border-radius: 2px; }
        .btn-dmoz-primary { background-color: var(--dmoz-bar-green); color: #000000; border: 1px solid #7f9db9; font-weight: bold; border-radius: 2px; }
        .btn-dmoz-primary:hover { background-color: #b3ffb3; border-color: var(--dmoz-green); }
        .dashboard-wrapper { display: none; min-height: 100vh; flex-direction: column; }
        .sidebar { width: 260px; background-color: #fcfcfc; border-right: 2px solid var(--dmoz-gray-bar); color: #000000; min-height: 100vh; position: fixed; padding: 2rem 1.25rem; z-index: 100; transition: transform 0.3s ease; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 2rem; transition: margin 0.3s ease, width 0.3s ease; }
        .mobile-header { display: none; background-color: var(--dmoz-gray-bar); border-bottom: 2px solid #dddddd; color: #000000; padding: 1rem; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 101; }
        .card-custom { background: #ffffff; border: 1px solid var(--dmoz-green); border-radius: 4px; margin-bottom: 2rem; overflow: hidden; }
        .card-custom-header { padding: 0.75rem 1.25rem; font-weight: bold; background-color: var(--dmoz-bar-green); color: #000000; border-bottom: 1px solid var(--dmoz-green); display: flex; align-items: center; gap: 0.5rem; font-size: 15px; }
        @media (max-width: 991.98px) { .sidebar { transform: translateX(-100%); height: 100vh; background-color: #ffffff; } .sidebar.active { transform: translateX(0); } .main-content { margin-left: 0; width: 100%; padding: 1.25rem; } .mobile-header { display: flex; } }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="loginSection" class="login-wrapper">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="d-inline-block p-2 mb-2" style="background: var(--dmoz-bar-green); border: 1px solid var(--dmoz-green);"><i class="fa-solid fa-folder-open fa-2x" style="color: var(--dmoz-green)"></i></div>
                <h4 class="fw-bold mb-1" style="color: var(--dmoz-green)">dmoz otomasyon</h4>
                <p class="text-muted small">Google Hesap Erişimli Yönetim Paneli</p>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold"><i class="fa-solid fa-key me-1" style="color: var(--dmoz-green)"></i> GitHub Token Şifreniz</label>
                <input type="password" id="githubTokenInput" class="form-control" placeholder="ghp_...">
            </div>

            <div class="text-center my-4">
                <button onclick="requestGoogleAuth()" class="btn btn-dmoz-primary btn-lg w-100 py-2.5">
                    <i class="fa-brands fa-google me-2" style="color: #4285F4"></i> hamdiuludag@gmail.com ile Giriş
                </button>
            </div>
            <div id="loginError" class="text-danger text-center small fw-bold" style="display:none;"><i class="fa-solid fa-triangle-exclamation me-1"></i> Bağlantı veya yetki hatası oluştu!</div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="adminSection" class="dashboard-wrapper">
        <div class="mobile-header">
            <h5 class="fw-bold m-0" style="color: var(--dmoz-green)"><i class="fa-solid fa-folder-tree me-2"></i>dmoz / blogger-rss</h5>
            <button class="btn btn-outline-secondary btn-sm" onclick="toggleSidebar()"><i class="fa-solid fa-bars fa-lg"></i></button>
        </div>

        <div class="sidebar d-flex flex-column justify-content-between" id="sidebarMenu">
            <div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold m-0" style="color: var(--dmoz-green)"><i class="fa-solid fa-folder-tree me-2"></i>dmoz dizini</h4>
                    <button class="btn btn-link text-dark p-0 d-lg-none" onclick="toggleSidebar()"><i class="fa-solid fa-xmark fa-xl"></i></button>
                </div>
                <div class="p-2 small mb-3" style="background-color: var(--dmoz-gray-bar); font-weight: bold; border-left: 3px solid var(--dmoz-green)">Top: Dünya: Türkçe</div>
                <div class="nav flex-column nav-pills">
                    <a class="nav-link active py-2 px-2 small fw-bold mb-1 rounded-0" href="#"><i class="fa-solid fa-square-rss me-2" style="color: var(--dmoz-green)"></i> RSS Otomasyon Havuzu</a>
                </div>
            </div>
            <div class="d-flex align-items-center p-2" style="background-color: var(--dmoz-gray-bar); border: 1px solid #dddddd;">
                <div class="rounded-circle bg-white text-dark d-flex align-items-center justify-content-center border" style="width: 34px; height: 34px; border-color: var(--dmoz-green) !important;"><i class="fa-solid fa-user" style="color: var(--dmoz-green)"></i></div>
                <div class="ms-2">
                    <div class="small fw-bold">Hamdi (Editör)</div>
                    <div class="text-muted" style="font-size: 11px;"><i class="fa-solid fa-circle text-success me-1" style="font-size: 8px;"></i>OAuth2 Bağlı</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom flex-wrap gap-2">
                <h3 class="fw-bold mb-0" style="color: var(--dmoz-green)"><i class="fa-solid fa-folder-open me-2"></i>Google Onaylı RSS Yönetim Merkezi</h3>
                <button onclick="handleLogout()" class="btn btn-sm px-3 fw-bold btn-dmoz-primary"><i class="fa-solid fa-power-off me-1" style="color: red"></i> Güvenli Çıkış</button>
            </div>

            <div class="card-custom">
                <div class="card-custom-header"><i class="fa-solid fa-plus-minus" style="color: var(--dmoz-green)"></i> Yeni Otomatik RSS Adresi Tanımla</div>
                <div class="card-body p-4 bg-light bg-opacity-50">
                    <div class="row g-3">
                        <div class="col-lg-6">
                            <label class="form-label small fw-bold"><i class="fa-solid fa-link me-1" style="color: var(--dmoz-green)"></i> RSS URL Adresi</label>
                            <input type="url" id="rssUrl" class="form-control" placeholder="https://site.com" required>
                        </div>
                        <div class="col-lg-3 col-md-6">
                            <label class="form-label small fw-bold"><i class="fa-solid fa-stopwatch me-1" style="color: var(--dmoz-green)"></i> Zamanlama Periyodu</label>
                            <select id="intervalMinutes" class="form-select">
                                <option value="5">5 Dakika</option>
                                <option value="10">10 Dakika</option>
                                <option value="20">20 Dakika</option>
                                <option value="30">30 Dakika</option>
                                <option value="60" selected>1 Saat</option>
                                <option value="120">2 Saat</option>
                                <option value="180">3 Saat</option>
                            </select>
                        </div>
                        <div class="col-lg-3 col-md-6">
                            <label class="form-label small fw-bold"><i class="fa-solid fa-tags me-1" style="color: var(--dmoz-green)"></i> Oto Kategori</label>
                            <select id="autoCategory" class="form-select">
                                <option value="true">Aktif (RSS'ten Çek)</option>
                                <option value="false">Pasif</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold"><i class="fa-solid fa-pencil me-1" style="color: var(--dmoz-green)"></i> Sabit Etiketler (Blogger İçin - Virgülle Ayırın)</label>
                            <input type="text" id="customLabels" class="form-control" placeholder="haber, guncel, sondakika">
                        </div>
                        <div class="col-12 text-end">
                            <button onclick="addNewRss()" class="btn btn-dmoz-primary px-4 fw-bold w-100 w-sm-auto"><i class="fa-solid fa-file-shield me-1" style="color: var(--dmoz-green)"></i> Ayarları Depoya kaydet</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-custom">
